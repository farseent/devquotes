version: "3.8"

services:
  mongo:
    image: mongo:6.0
    container_name: devquotes-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: devquotes-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/devquotes
      - PORT=5000
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: devquotes-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
